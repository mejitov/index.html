<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SAYT</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f4f4f4; }
        .section { margin-bottom: 40px; padding: 20px; background: white; border-radius: 15px; }
        .photo-container { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        img { width: 300px; border-radius: 10px; border: 3px solid #d63384; }
        h1 { color: #d63384; }
        h2 { color: #333; border-bottom: 2px solid #d63384; display: inline-block; }
    </style>
</head>
<body>

    <h1>Салон Красоты / Beauty Salon</h1>
    
    <div class="section">
        <h2>Наши работы: До и После</h2>
        <div class="photo-container">
            <div>
                <p><b>ДО</b></p>
                <img src="foto_do.jpg" alt="До">
            </div>
            <div>
                <p><b>ПОСЛЕ</b></p>
                <img src="foto_posle.jpg" alt="После">
            </div>
        </div>
    </div>

    <div class="section">
        <p>Здесь будет твой текст на узбекском, русском и английском!</p>
    </div>

</body>
</html>
