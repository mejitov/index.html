<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Преображение - Работы</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #fff5f8; color: #333; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: #d63384; }
        .gallery { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 30px; }
        .card { background: #fefefe; border: 1px solid #eee; padding: 10px; border-radius: 15px; width: 45%; }
        img { width: 100%; border-radius: 10px; display: block; margin-bottom: 10px; }
        .label { font-weight: bold; color: #555; background: #eee; padding: 5px; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Работы моей невестки</h1>
        <p>Красота и профессионализм в каждой детали</p>
        
        <div class="gallery">
            <div class="card">
                <img src="https://via.placeholder.com/400x500?text=ФОТО+ДО" alt="До">
                <span class="label">ДО</span>
            </div>
            <div class="card">
                <img src="https://via.placeholder.com/400x500?text=ФОТО+ПОСЛЕ" alt="После">
                <span class="label">ПОСЛЕ</span>
            </div>
        </div>

        <br>
        <p>Чтобы заменить эти картинки на настоящие, просто загрузи фото в этот репозиторий!</p>
    </div>
</body>
</html>
